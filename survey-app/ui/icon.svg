<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e6ac7"/>
      <stop offset="100%" stop-color="#0c3980"/>
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8efff"/>
    </linearGradient>
  </defs>

  <!-- App background — modern rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow at top -->
  <rect width="64" height="30" rx="14" fill="white" opacity="0.06"/>

  <!-- Document body -->
  <rect x="13" y="12" width="30" height="37" rx="3.5" fill="url(#doc)"/>

  <!-- Folded corner -->
  <path d="M35 12 L43 12 L43 20 Z" fill="#c5d3ee" opacity="0.7"/>
  <path d="M35 12 L35 20 L43 20" fill="#dde6f8"/>

  <!-- Header stripe -->
  <rect x="13" y="12" width="22" height="8" rx="3.5" fill="#bad0f8" opacity="0.6"/>
  <rect x="13" y="17" width="22" height="3" fill="#bad0f8" opacity="0.6"/>

  <!-- Content lines -->
  <rect x="18" y="26" width="18" height="2.5" rx="1.2" fill="#98aecf" opacity="0.9"/>
  <rect x="18" y="31" width="22" height="2.5" rx="1.2" fill="#98aecf" opacity="0.9"/>
  <rect x="18" y="36" width="14" height="2.5" rx="1.2" fill="#98aecf" opacity="0.9"/>

  <!-- Checkmark badge — drop shadow -->
  <circle cx="46" cy="46" r="11.5" fill="#000" opacity="0.25"/>

  <!-- Checkmark badge — green circle -->
  <circle cx="46" cy="45" r="11.5" fill="#22a64a"/>
  <circle cx="46" cy="45" r="11.5" fill="white" opacity="0.08"/>

  <!-- Checkmark -->
  <path d="M40.5 45 L44.5 49.5 L52 38.5"
        stroke="white" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
</svg>
